<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Remover FIT</title>

<style>
body{
  background:#0d0d0f;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.dropzone{
  border:2px dashed #444;
  padding:40px;
  text-align:center;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  cursor:pointer;
}

.btn-download{
  display:block;
  opacity:0;
  pointer-events:none;
  margin-top:20px;
  padding:15px;
  border:1px solid #47ffb2;
  color:#47ffb2;
  text-align:center;
  text-decoration:none;
  transition:.2s;
}

.btn-download.visible{
  opacity:1;
  pointer-events:auto;
}
</style>

</head>

<body>

<h2>GPX / FIT → FIT Cleaner</h2>

<div class="dropzone">
  <input type="file" id="fileInput" accept=".gpx,.fit">
</div>

<input type="range" id="threshold" min="0.5" max="10" step="0.5" value="2">
<p>Soglia: <span id="val">2</span> km/h</p>

<button id="process">PROCESSA</button>

<a id="download" class="btn-download">SCARICA FIT</a>

<script>

let parsed = null;

const input = document.getElementById("fileInput");
const btn = document.getElementById("process");
const dl = document.getElementById("download");

document.getElementById("threshold").oninput = e=>{
  document.getElementById("val").textContent = e.target.value;
};

// ---------------- GPX ----------------
function parseGPX(text){
  const xml = new DOMParser().parseFromString(text,"text/xml");
  const pts = [];
  const trkpts = xml.getElementsByTagName("trkpt");

  for(let p of trkpts){
    const t = p.getElementsByTagName("time")[0];
    if(!t) continue;

    pts.push({
      lat:+p.getAttribute("lat"),
      lon:+p.getAttribute("lon"),
      time:new Date(t.textContent),
      ele:0
    });
  }
  return pts;
}

// ---------------- FIT (TUO ORIGINALE NON TOCCATO) ----------------
function parseFIT(buffer){
  const bytes = new Uint8Array(buffer);
  const pts = [];

  let i = 14;
  const defs = {};

  while(i < bytes.length-2){

    const header = bytes[i];
    const isDef = (header & 0x40) !== 0;
    const local = header & 0x0F;

    if(isDef){
      i++;
      i++;
      const arch = bytes[i++];
      const global = arch === 0
        ? (bytes[i] | (bytes[i+1]<<8))
        : (bytes[i+1] | (bytes[i]<<8));

      i += 2;

      const num = bytes[i++];
      const fields = [];

      for(let f=0; f<num; f++){
        fields.push({
          num:bytes[i++],
          size:bytes[i++],
          type:bytes[i++]
        });
      }

      defs[local] = {global,arch,fields};

    } else {
      i++;

      const def = defs[local];
      if(!def) continue;

      let offset = i;
      let ts=null,lat=null,lon=null;

      for(const f of def.fields){
        if(def.global===20){

          const r32 = ()=>
            (bytes[offset] |
            (bytes[offset+1]<<8) |
            (bytes[offset+2]<<16) |
            (bytes[offset+3]<<24));

          if(f.num===253) ts=r32();
          if(f.num===0) lat=r32();
          if(f.num===1) lon=r32();
        }
        offset += f.size;
      }

      if(ts!==null && lat!==null && lon!==null){
        pts.push({
          lat:lat*(180/2147483648),
          lon:lon*(180/2147483648),
          time:new Date((ts+631065600)*1000),
          ele:0
        });
      }

      i = offset;
    }
  }

  return pts;
}

// ---------------- CLEAN ----------------
function clean(pts,th){
  let out=[];
  for(let i=1;i<pts.length;i++){
    let dt=(pts[i].time-pts[i-1].time)/1000;
    let d=Math.sqrt(
      Math.pow(pts[i].lat-pts[i-1].lat,2)+
      Math.pow(pts[i].lon-pts[i-1].lon,2)
    )*111000;

    let kmh=(d/dt)*3.6;

    if(kmh>=th) out.push(pts[i]);
  }
  return out;
}

// ---------------- FIT OUTPUT (ORIGINALE TUO NON MODIFICATO) ----------------
function writeFIT(pts){
  const buf=[];
  for(let p of pts){
    buf.push(p.lat,p.lon,p.time.getTime());
  }
  return new Blob(
    [new Uint8Array(new TextEncoder().encode(JSON.stringify(buf)))],
    {type:"application/octet-stream"}
  );
}

// ---------------- LOAD FILE ----------------
input.onchange = async e=>{
  const f=e.target.files[0];
  if(!f) return;

  const ext=f.name.split(".").pop();

  if(ext==="gpx"){
    parsed=parseGPX(await f.text());
  } else {
    parsed=parseFIT(await f.arrayBuffer());
  }
};

// ---------------- PROCESS ----------------
btn.onclick=()=>{

  const th=+document.getElementById("threshold").value;

  const cleaned=clean(parsed,th);

  const blob=writeFIT(cleaned);

  const url=URL.createObjectURL(blob);

  // 🔥 FIX DEFINITIVO BOTTONE
  const old=dl.dataset.url;
  if(old) URL.revokeObjectURL(old);

  dl.dataset.url=url;
  dl.href=url;
  dl.download="cleaned.fit";

  dl.style.display="block";
  dl.style.opacity="1";
  dl.style.pointerEvents="auto";

  dl.classList.add("visible");

  dl.textContent="⬇ SCARICA FIT";
};

</script>

</body>
</html>
