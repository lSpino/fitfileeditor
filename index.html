<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FIT Pause & Merge Tool</title>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    margin-top:0;
}

button{
    padding:14px 22px;
    border:none;
    background:#0077ff;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.settings{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.settings label{
    display:flex;
    flex-direction:column;
    gap:6px;
}

input[type=number]{
    padding:8px;
    width:120px;
}

.log{
    margin-top:25px;
    background:#111;
    color:#0f0;
    padding:15px;
    border-radius:10px;
    font-family:monospace;
    max-height:350px;
    overflow:auto;
}

.filelist{
    margin-top:20px;
    padding:10px;
    background:#f0f0f0;
    border-radius:8px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h1>FIT Pause & Merge Tool</h1>

    <p>
        - 1 FIT → aggiunge pause automatiche<br>
        - più FIT → merge cronologico + pause
    </p>

    <input
        type="file"
        id="fileInput"
        accept=".fit"
        multiple
        class="hidden"
    >

    <button id="selectBtn">
        Seleziona file FIT
    </button>

    <div class="filelist" id="filelist">
        Nessun file selezionato
    </div>

    <div class="settings">

        <label>
            Velocità minima pausa (km/h)
            <input
                type="number"
                id="minSpeed"
                value="1"
                step="0.1"
            >
        </label>

        <label>
            Durata minima pausa (sec)
            <input
                type="number"
                id="minPause"
                value="15"
            >
        </label>

    </div>

    <button id="processBtn" style="margin-top:20px;">
        Processa FIT
    </button>

    <div class="log" id="log"></div>

</div>

<script type="module">

import FitParser from 'https://cdn.skypack.dev/fit-file-parser';

const FIT_EPOCH = 631065600;

let loadedFiles = [];

const fileInput =
    document.getElementById('fileInput');

const filelist =
    document.getElementById('filelist');

const logEl =
    document.getElementById('log');

/*
========================================
LOG
========================================
*/

function log(msg){

    console.log(msg);

    logEl.innerHTML += msg + "<br>";

    logEl.scrollTop = logEl.scrollHeight;
}

/*
========================================
FILE PICKER
========================================
*/

document
.getElementById('selectBtn')
.addEventListener('click', ()=>{

    fileInput.click();
});

fileInput.addEventListener('change', ()=>{

    loadedFiles = [...fileInput.files];

    if(!loadedFiles.length){

        filelist.innerHTML =
            'Nessun file selezionato';

        return;
    }

    filelist.innerHTML = '';

    loadedFiles.forEach(file=>{

        filelist.innerHTML +=
            '• ' + file.name + '<br>';
    });

});

/*
========================================
PARSE FIT
========================================
*/

async function parseFit(file){

    const buffer = await file.arrayBuffer();

    return new Promise((resolve,reject)=>{

        const parser = new FitParser({
            force: true,
            speedUnit: 'm/s',
            lengthUnit: 'm',
            temperatureUnit: 'celsius',
            elapsedRecordField: true,
            mode: 'cascade'
        });

        parser.parse(buffer, (error, data)=>{

            if(error){

                reject(error);

            }else{

                resolve(data);
            }
        });

    });
}

/*
========================================
MERGE RECORDS
========================================
*/

function mergeActivities(activities){

    let records = [];

    activities.forEach(a=>{

        if(a.records){

            records.push(...a.records);
        }
    });

    records.sort((a,b)=>
        new Date(a.timestamp)
        -
        new Date(b.timestamp)
    );

    return records;
}

/*
========================================
DETECT PAUSES
========================================
*/

function detectPauses(
    records,
    minSpeedKmh,
    minPauseSeconds
){

    const events = [];

    const minSpeed =
        minSpeedKmh / 3.6;

    let paused = false;
    let stopCandidate = null;

    for(let i=0; i<records.length; i++){

        const r = records[i];

        if(!r.timestamp) continue;

        const speed = r.speed || 0;

        const ts = new Date(r.timestamp);

        if(speed < minSpeed){

            if(!stopCandidate){

                stopCandidate = ts;
            }

            const duration =
                (ts - stopCandidate) / 1000;

            if(
                duration >= minPauseSeconds
                &&
                !paused
            ){

                paused = true;

                events.push({
                    timestamp:
                        new Date(stopCandidate),
                    type:'stop'
                });

                log(
                    'STOP  ' +
                    stopCandidate
                    .toLocaleTimeString()
                );
            }

        }else{

            stopCandidate = null;

            if(paused){

                paused = false;

                events.push({
                    timestamp: ts,
                    type:'start'
                });

                log(
                    'START ' +
                    ts.toLocaleTimeString()
                );
            }
        }
    }

    return events;
}

/*
========================================
CRC
========================================
*/

function crc16(data){

    let crc = 0;

    for(let i=0;i<data.length;i++){

        crc ^= data[i];

        for(let j=0;j<8;j++){

            if(crc & 1){

                crc =
                    (crc >> 1)
                    ^
                    0xA001;

            }else{

                crc >>= 1;
            }
        }
    }

    return crc;
}

/*
========================================
FIT TIMESTAMP
========================================
*/

function fitTimestamp(date){

    return Math.floor(
        date.getTime()/1000
        -
        FIT_EPOCH
    );
}

/*
========================================
CREATE FIT
========================================
*/

function createFit(records, pauseEvents){

    const bytes = [];

    function push(arr){

        bytes.push(...arr);
    }

    /*
    HEADER
    */

    push([
        14,
        0x10,
        100,
        0,0,0,0,
        0x2E,0x46,0x49,0x54,
        0,0
    ]);

    /*
    RECORDS
    */

    records.forEach(r=>{

        if(!r.timestamp) return;

        const ts =
            fitTimestamp(
                new Date(r.timestamp)
            );

        push([
            0x00,
            ts & 255,
            (ts>>8)&255,
            (ts>>16)&255,
            (ts>>24)&255
        ]);
    });

    /*
    EVENTS
    */

    pauseEvents.forEach(ev=>{

        const ts =
            fitTimestamp(ev.timestamp);

        push([
            0x01,
            ts & 255,
            (ts>>8)&255,
            (ts>>16)&255,
            (ts>>24)&255,
            ev.type === 'stop'
                ? 0
                : 1
        ]);
    });

    /*
    DATASIZE
    */

    const dataSize =
        bytes.length - 14;

    bytes[4] = dataSize & 255;
    bytes[5] = (dataSize>>8)&255;
    bytes[6] = (dataSize>>16)&255;
    bytes[7] = (dataSize>>24)&255;

    /*
    CRC
    */

    const crc = crc16(bytes);

    bytes.push(crc & 255);
    bytes.push((crc>>8)&255);

    return new Uint8Array(bytes);
}

/*
========================================
DOWNLOAD
========================================
*/

function downloadFit(data){

    const blob = new Blob(
        [data],
        {
            type:'application/octet-stream'
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;
    a.download = 'processed.fit';

    a.click();

    URL.revokeObjectURL(url);
}

/*
========================================
MAIN
========================================
*/

document
.getElementById('processBtn')
.addEventListener('click', async ()=>{

    try{

        logEl.innerHTML = '';

        if(!loadedFiles.length){

            alert(
                'Seleziona almeno un file FIT'
            );

            return;
        }

        log('Parsing FIT...');

        const activities = [];

        for(const file of loadedFiles){

            log('Parsing: ' + file.name);

            const parsed =
                await parseFit(file);

            activities.push(parsed);
        }

        /*
        SORT
        */

        activities.sort((a,b)=>{

            const ta =
                new Date(
                    a.activity
                    .sessions[0]
                    .start_time
                );

            const tb =
                new Date(
                    b.activity
                    .sessions[0]
                    .start_time
                );

            return ta - tb;
        });

        /*
        MERGE
        */

        const records =
            mergeActivities(activities);

        log(
            'Records: ' +
            records.length
        );

        /*
        PAUSES
        */

        const minSpeed =
            parseFloat(
                document
                .getElementById('minSpeed')
                .value
            );

        const minPause =
            parseInt(
                document
                .getElementById('minPause')
                .value
            );

        const pauseEvents =
            detectPauses(
                records,
                minSpeed,
                minPause
            );

        log(
            'Pause trovate: '
            +
            pauseEvents.length
        );

        /*
        FIT
        */

        log('Creazione FIT...');

        const fitData =
            createFit(
                records,
                pauseEvents
            );

        /*
        DOWNLOAD
        */

        downloadFit(fitData);

        log('DONE');

    }catch(err){

        console.error(err);

        alert(
            'Errore:\n' + err
        );
    }

});

</script>

</body>
</html>
