<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX/FIT Stop Remover Pro 2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #16161a; --border: #2a2a30;
    --accent: #e8ff47; --text: #e8e8ec; --muted: #6b6b78;
    --danger: #ff4747; --success: #47ffb2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
  }
  header { width: 100%; max-width: 700px; margin-bottom: 2rem; }
  h1 { font-family: 'Barlow Condensed'; font-size: 3.5rem; line-height: 0.9; color: var(--accent); }
  .container { width: 100%; max-width: 700px; background: var(--surface); border: 1px solid var(--border); padding: 2rem; }
  .dropzone {
    border: 2px dashed var(--border); padding: 3rem; text-align: center;
    cursor: pointer; margin-bottom: 1.5rem; transition: 0.2s;
  }
  .dropzone:hover { border-color: var(--accent); background: #ffffff05; }
  .field { margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .btn {
    width: 100%; padding: 1rem; background: var(--accent); color: #000;
    border: none; font-family: 'Barlow Condensed'; font-size: 1.2rem; font-weight: 800;
    cursor: pointer; text-transform: uppercase; margin-top: 1rem;
  }
  .btn:disabled { opacity: 0.3; }
  .stats { margin-top: 2rem; display: none; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  .visible { display: block; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
  .stat-val { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
  .download-link {
    display: none; margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--success);
    color: var(--success); text-align: center; text-decoration: none; font-weight: bold;
  }
</style>
</head>
<body>

<header>
  <h1>FIT/GPX<br>CLEANER</h1>
  <p style="color:var(--muted)">Input: GPX/FIT ➔ Output: Native FIT</p>
</header>

<div class="container">
  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept=".gpx,.fit" style="display:none">
    <p id="fileNameDisplay">Trascina qui il file o clicca</p>
  </div>

  <div class="field">
    <label>Soglia Movimento: <span id="threshShow">2.5</span> km/h</label>
    <input type="range" id="threshold" min="0.5" max="15" step="0.5" value="2.5">
  </div>

  <button class="btn" id="btnProcess" disabled>Processa e Genera FIT</button>

  <div class="stats" id="statsArea">
    <div class="stat-grid">
      <div><label>Tempo in Movimento</label><div class="stat-val" id="moveTime">--</div></div>
      <div><label>Tempo Soste</label><div class="stat-val" id="stopTime">--</div></div>
      <div><label>Media Reale</label><div class="stat-val" id="avgSpeed">--</div></div>
      <div><label>Punti Rimossi</label><div class="stat-val" id="ptsRemoved">--</div></div>
    </div>
    <a href="#" class="download-link" id="dlBtn">SCARICA FILE .FIT PULITO</a>
  </div>
</div>

<script>
// --- COSTANTI E UTILS ---
const FIT_EPOCH = 631065600000; 

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI / 180;
  const dLon = (lon2-lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// --- CRC CALCULATION ---
function getCRC(data) {
  const table = [
    0x0000, 0xCC01, 0xD801, 0x1400, 0xF001, 0x3C00, 0x2800, 0xE401,
    0xA001, 0x6C00, 0x7800, 0xB401, 0x5000, 0x9C01, 0x8801, 0x4400
  ];
  let crc = 0;
  for (let i = 0; i < data.length; i++) {
    let byte = data[i];
    let tmp = table[crc & 0xF];
    crc = (crc >> 4) & 0x0FFF;
    crc = crc ^ tmp ^ table[byte & 0xF];
    tmp = table[crc & 0xF];
    crc = (crc >> 4) & 0x0FFF;
    crc = crc ^ tmp ^ table[(byte >> 4) & 0xF];
  }
  return crc;
}

// --- PARSER GPX ---
function parseGPX(text) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");
  const trkpts = Array.from(xml.querySelectorAll('trkpt'));
  return trkpts.map(pt => ({
    lat: parseFloat(pt.getAttribute('lat')),
    lon: parseFloat(pt.getAttribute('lon')),
    ele: parseFloat(pt.querySelector('ele')?.textContent || 0),
    time: new Date(pt.querySelector('time').textContent)
  }));
}

// --- FIT WRITER (REVISED) ---
function createFitFile(pts, moveSec, stopSec, distance) {
  const chunks = [];
  const add = (arr) => chunks.push(new Uint8Array(arr));
  
  const toSemicircles = deg => Math.round(deg * (2**31 / 180));
  const toFitTime = date => Math.round((date.getTime() - FIT_EPOCH) / 1000);

  // 1. File ID Definition & Data
  add([0x40, 0, 0, 0, 0, 5, 3, 4, 140, 4, 4, 134, 1, 2, 132, 2, 2, 132, 0, 1, 0]); // Def
  const fid = new DataView(new ArrayBuffer(14));
  fid.setUint8(0, 0x00); // Data record local 0
  fid.setUint32(1, 0, true); // Serial
  fid.setUint32(5, toFitTime(pts[0].time), true);
  fid.setUint16(9, 1, true); // Manufacturer
  fid.setUint16(11, 0, true); // Product
  fid.setUint8(13, 4); // Type (Activity)
  add(new Uint8Array(fid.buffer));

  // 2. Record Definition (Local 1)
  // Fields: Timestamp(253), Lat(0), Long(1), Alt(2), Distance(5)
  add([0x41, 0, 0, 20, 0, 5, 253, 4, 134, 0, 4, 133, 1, 4, 133, 2, 2, 132, 5, 4, 134]);

  let totalD = 0;
  for (let i = 0; i < pts.length; i++) {
    if (i > 0) totalD += haversine(pts[i-1].lat, pts[i-1].lon, pts[i].lat, pts[i].lon);
    const rv = new DataView(new ArrayBuffer(19));
    rv.setUint8(0, 0x01); // Local 1
    rv.setUint32(1, toFitTime(pts[i].time), true);
    rv.setInt32(5, toSemicircles(pts[i].lat), true);
    rv.setInt32(9, toSemicircles(pts[i].lon), true);
    rv.setUint16(13, Math.round((pts[i].ele + 500) * 5), true);
    rv.setUint32(15, Math.round(totalD * 100), true);
    add(new Uint8Array(rv.buffer));
  }

  // 3. Lap & Session Definition (Simplified for compatibility)
  add([0x42, 0, 0, 18, 0, 4, 253, 4, 134, 8, 4, 134, 9, 4, 134, 7, 4, 134]); // Session Def
  const sv = new DataView(new ArrayBuffer(17));
  sv.setUint8(0, 0x02);
  sv.setUint32(1, toFitTime(pts[pts.length-1].time), true); // Timestamp
  sv.setUint32(5, Math.round((moveSec + stopSec) * 1000), true); // Total elapsed
  sv.setUint32(9, Math.round(moveSec * 1000), true); // Total moving
  sv.setUint32(13, Math.round(totalD * 100), true); // Total dist
  add(new Uint8Array(sv.buffer));

  // Header & CRC
  const body = new Uint8Array(chunks.reduce((acc, c) => acc + c.length, 0));
  let offset = 0;
  chunks.forEach(c => { body.set(c, offset); offset += c.length; });

  const header = new Uint8Array(14);
  const hv = new DataView(header.buffer);
  hv.setUint8(0, 14); hv.setUint8(1, 0x10); // Protocol & Profile
  hv.setUint16(2, 2132, true);
  hv.setUint32(4, body.length + 2, true);
  header.set([0x2E, 0x46, 0x49, 0x54], 8); // ".FIT"
  hv.setUint16(12, getCRC(header.slice(0, 12)), true);

  const final = new Uint8Array(header.length + body.length + 2);
  final.set(header);
  final.set(body, 14);
  const finalCrc = getCRC(final.slice(0, -2));
  new DataView(final.buffer).setUint16(final.length - 2, finalCrc, true);

  return final;
}

// --- UI LOGIC ---
let rawPts = [];
const dropzone = el('dropzone');
const fileInput = el('fileInput');

dropzone.onclick = () => fileInput.click();
el('threshold').oninput = (e) => el('threshShow').textContent = e.target.value;

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  el('fileNameDisplay').textContent = file.name;
  const text = await file.text();
  rawPts = parseGPX(text); // In un'app reale qui andrebbe anche il parser FIT input
  el('btnProcess').disabled = false;
};

el('btnProcess').onclick = () => {
  const thresh = parseFloat(el('threshold').value);
  const kept = [rawPts[0]];
  let moveSec = 0, stopSec = 0, dist = 0;

  for (let i = 1; i < rawPts.length; i++) {
    const dt = (rawPts[i].time - rawPts[i-1].time) / 1000;
    const d = haversine(rawPts[i-1].lat, rawPts[i-1].lon, rawPts[i].lat, rawPts[i].lon);
    if (dt <= 0) continue;
    
    if ((d/dt)*3.6 >= thresh) {
      kept.push(rawPts[i]);
      moveSec += dt;
      dist += d;
    } else {
      stopSec += dt;
    }
  }

  const fitBlob = createFitFile(kept, moveSec, stopSec, dist);
  const url = URL.createObjectURL(new Blob([fitBlob]));
  
  el('moveTime').textContent = Math.floor(moveSec/60) + 'm ' + (moveSec%60) + 's';
  el('stopTime').textContent = Math.floor(stopSec/60) + 'm ' + (stopSec%60) + 's';
  el('avgSpeed').textContent = ((dist/1000)/(moveSec/3600)).toFixed(1) + ' km/h';
  el('ptsRemoved').textContent = rawPts.length - kept.length;
  
  el('statsArea').classList.add('visible');
  el('dlBtn').href = url;
  el('dlBtn').download = "clean_activity.fit";
  el('dlBtn').style.display = 'block';
};

function el(id) { return document.getElementById(id); }
</script>
</body>
</html>
