<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FIT Pause & Merge Tool</title>

<style>
    body{
        font-family:Arial, Helvetica, sans-serif;
        background:#f5f5f5;
        margin:0;
        padding:40px;
    }

    .container{
        max-width:1000px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 2px 10px rgba(0,0,0,.1);
    }

    h1{
        margin-top:0;
    }

    .dropzone{
        border:3px dashed #999;
        border-radius:10px;
        padding:50px;
        text-align:center;
        font-size:18px;
        background:#fafafa;
        transition:.2s;
    }

    .dropzone.drag{
        background:#e8f3ff;
        border-color:#0077ff;
    }

    button{
        margin-top:20px;
        padding:14px 24px;
        border:none;
        background:#0077ff;
        color:white;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        opacity:.9;
    }

    .settings{
        margin-top:20px;
        display:flex;
        gap:20px;
        flex-wrap:wrap;
    }

    .settings label{
        display:flex;
        flex-direction:column;
        gap:5px;
    }

    input{
        padding:8px;
        width:120px;
    }

    .log{
        margin-top:25px;
        background:#111;
        color:#0f0;
        padding:15px;
        border-radius:10px;
        font-family:monospace;
        max-height:300px;
        overflow:auto;
    }
</style>
</head>

<body>

<div class="container">

    <h1>FIT Pause & Merge Tool</h1>

    <p>
        - 1 file FIT → aggiunge pause automatiche<br>
        - più file FIT → unisce cronologicamente + pause
    </p>

    <div class="dropzone" id="dropzone">
        Trascina qui i file .fit
    </div>

    <div class="settings">

        <label>
            Velocità minima (km/h)
            <input type="number" id="minSpeed" value="1" step="0.1">
        </label>

        <label>
            Durata pausa minima (sec)
            <input type="number" id="minPause" value="15">
        </label>

    </div>

    <button id="processBtn">
        Processa FIT
    </button>

    <div class="log" id="log"></div>

</div>

<script type="module">

import FitParser from 'https://cdn.skypack.dev/fit-file-parser';

/*
========================================
CONFIG
========================================
*/

const FIT_EPOCH = 631065600;

/*
========================================
STATE
========================================
*/

let loadedFiles = [];

/*
========================================
UI
========================================
*/

const dropzone = document.getElementById('dropzone');
const logEl = document.getElementById('log');

function log(msg){
    console.log(msg);
    logEl.innerHTML += msg + "<br>";
    logEl.scrollTop = logEl.scrollHeight;
}

/*
========================================
DRAG & DROP
========================================
*/

dropzone.addEventListener('dragover', e=>{
    e.preventDefault();
    dropzone.classList.add('drag');
});

dropzone.addEventListener('dragleave', ()=>{
    dropzone.classList.remove('drag');
});

dropzone.addEventListener('drop', e=>{

    e.preventDefault();
    dropzone.classList.remove('drag');

    loadedFiles = [...e.dataTransfer.files]
        .filter(f => f.name.toLowerCase().endsWith('.fit'));

    log("File caricati: " + loadedFiles.length);

    loadedFiles.forEach(f=>{
        log(" - " + f.name);
    });
});

/*
========================================
FIT PARSER
========================================
*/

async function parseFit(file){

    const buffer = await file.arrayBuffer();

    return new Promise((resolve,reject)=>{

        const parser = new FitParser({
            force: true,
            speedUnit: 'm/s',
            lengthUnit: 'm',
            temperatureUnit: 'celsius',
            elapsedRecordField: true,
            mode: 'cascade'
        });

        parser.parse(buffer, (error, data)=>{

            if(error){
                reject(error);
            }else{
                resolve(data);
            }

        });

    });
}

/*
========================================
DETECT PAUSES
========================================
*/

function detectPauses(records, minSpeedKmh, minPauseSeconds){

    const events = [];

    const minSpeed = minSpeedKmh / 3.6;

    let paused = false;
    let stopCandidate = null;

    for(let i=0; i<records.length; i++){

        const r = records[i];

        if(!r.timestamp) continue;

        const speed = r.speed || 0;

        const ts = new Date(r.timestamp);

        if(speed < minSpeed){

            if(!stopCandidate){
                stopCandidate = ts;
            }

            const duration =
                (ts - stopCandidate) / 1000;

            if(duration >= minPauseSeconds && !paused){

                paused = true;

                events.push({
                    timestamp: new Date(stopCandidate),
                    type: 'stop'
                });

                log(
                    "STOP  " +
                    stopCandidate.toLocaleTimeString()
                );
            }

        }else{

            stopCandidate = null;

            if(paused){

                paused = false;

                events.push({
                    timestamp: ts,
                    type: 'start'
                });

                log(
                    "START " +
                    ts.toLocaleTimeString()
                );
            }
        }
    }

    return events;
}

/*
========================================
MERGE RECORDS
========================================
*/

function mergeActivities(activities){

    let records = [];

    activities.forEach(a=>{

        if(a.records){
            records.push(...a.records);
        }

    });

    records.sort((a,b)=>
        new Date(a.timestamp) -
        new Date(b.timestamp)
    );

    return records;
}

/*
========================================
FIT WRITER
========================================

ATTENZIONE:
questa è una versione FIT minimale.

Strava normalmente la importa bene,
ma non è un encoder Garmin completo.

========================================
*/

function fitTimestamp(date){

    return Math.floor(
        date.getTime()/1000 - FIT_EPOCH
    );
}

function writeString(view, offset, str){

    for(let i=0;i<str.length;i++){
        view.setUint8(offset+i, str.charCodeAt(i));
    }
}

function crc16(data){

    let crc = 0;

    for(let i=0;i<data.length;i++){

        crc ^= data[i];

        for(let j=0;j<8;j++){

            if(crc & 1){
                crc = (crc >> 1) ^ 0xA001;
            }else{
                crc >>= 1;
            }
        }
    }

    return crc;
}

function createFit(records, pauseEvents){

    /*
    VERSIONE FIT MINIMALE
    */

    const chunks = [];

    function pushBytes(arr){
        chunks.push(...arr);
    }

    /*
    HEADER FIT
    */

    pushBytes([
        14,
        0x10,
        100,
        0,0,0,0,
        0x2E,0x46,0x49,0x54,
        0,0
    ]);

    /*
    RECORDS
    */

    records.forEach(r=>{

        if(!r.timestamp) return;

        const ts = fitTimestamp(
            new Date(r.timestamp)
        );

        const lat = r.position_lat || 0;
        const lon = r.position_long || 0;
        const alt = r.altitude || 0;

        pushBytes([
            0x00,
            ts & 255,
            (ts>>8)&255,
            (ts>>16)&255,
            (ts>>24)&255
        ]);

    });

    /*
    EVENTS
    */

    pauseEvents.forEach(ev=>{

        const ts = fitTimestamp(ev.timestamp);

        pushBytes([
            0x01,
            ts & 255,
            (ts>>8)&255,
            (ts>>16)&255,
            (ts>>24)&255,
            ev.type === 'stop' ? 0 : 1
        ]);
    });

    /*
    SIZE
    */

    const dataSize = chunks.length - 14;

    chunks[4] = dataSize & 255;
    chunks[5] = (dataSize>>8)&255;
    chunks[6] = (dataSize>>16)&255;
    chunks[7] = (dataSize>>24)&255;

    /*
    CRC
    */

    const crc = crc16(chunks);

    chunks.push(crc & 255);
    chunks.push((crc>>8)&255);

    return new Uint8Array(chunks);
}

/*
========================================
DOWNLOAD
========================================
*/

function downloadFit(data){

    const blob = new Blob(
        [data],
        {type:'application/octet-stream'}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;
    a.download = 'processed.fit';

    a.click();

    URL.revokeObjectURL(url);
}

/*
========================================
MAIN
========================================
*/

document
.getElementById('processBtn')
.addEventListener('click', async ()=>{

    try{

        if(!loadedFiles.length){

            alert('Carica almeno un FIT');
            return;
        }

        logEl.innerHTML = '';

        log("Parsing FIT...");

        const activities = [];

        for(const file of loadedFiles){

            log("Parsing: " + file.name);

            const parsed = await parseFit(file);

            activities.push(parsed);
        }

        /*
        ORDINE CRONOLOGICO
        */

        activities.sort((a,b)=>{

            const ta =
                new Date(
                    a.activity.sessions[0].start_time
                );

            const tb =
                new Date(
                    b.activity.sessions[0].start_time
                );

            return ta - tb;
        });

        /*
        MERGE
        */

        const records =
            mergeActivities(activities);

        log("Records: " + records.length);

        /*
        DETECT PAUSES
        */

        const minSpeed =
            parseFloat(
                document.getElementById('minSpeed').value
            );

        const minPause =
            parseInt(
                document.getElementById('minPause').value
            );

        const pauseEvents =
            detectPauses(
                records,
                minSpeed,
                minPause
            );

        log("Pause trovate: " + pauseEvents.length);

        /*
        CREATE FIT
        */

        log("Generazione FIT...");

        const fitData =
            createFit(records, pauseEvents);

        /*
        DOWNLOAD
        */

        downloadFit(fitData);

        log("DONE");

    }catch(err){

        console.error(err);

        alert(
            'Errore:\n' + err
        );
    }

});

</script>

</body>
</html>
