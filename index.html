<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Remover FIT</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0d0d0f;
  color:#fff;
  padding:20px;
}

.dropzone{
  border:2px dashed #444;
  padding:40px;
  text-align:center;
  margin-bottom:20px;
}

button{
  padding:15px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

.btn-download{
  display:block;
  opacity:0;
  pointer-events:none;
  margin-top:20px;
  padding:15px;
  border:1px solid #47ffb2;
  color:#47ffb2;
  text-align:center;
  text-decoration:none;
  transition:0.2s;
}

.btn-download.visible{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>

<h2>GPX / FIT → FIT Cleaner</h2>

<div class="dropzone">
  <input type="file" id="fileInput" accept=".gpx,.fit">
</div>

<input type="range" id="threshold" min="0.5" max="10" step="0.5" value="2">
<p>Soglia: <span id="val">2</span> km/h</p>

<button id="process">PROCESSA</button>

<a id="download" class="btn-download">SCARICA FIT</a>

<script>

let pts = [];

const input = document.getElementById("fileInput");
const btn = document.getElementById("process");
const dl = document.getElementById("download");

document.getElementById("threshold").oninput = e=>{
  document.getElementById("val").textContent = e.target.value;
};

// ---------------- GPX PARSER ----------------
function parseGPX(text){
  const xml = new DOMParser().parseFromString(text,"text/xml");
  const trkpts = xml.getElementsByTagName("trkpt");

  let out = [];

  for(let p of trkpts){
    const t = p.getElementsByTagName("time")[0];
    if(!t) continue;

    out.push({
      lat:+p.getAttribute("lat"),
      lon:+p.getAttribute("lon"),
      time:new Date(t.textContent),
      ele:0
    });
  }

  return out;
}

// ---------------- SEMPLICE FIT WRITER (VALIDO BASE) ----------------
function writeFIT(points){

  const buf = [];

  for(let i=0;i<points.length;i++){
    const p = points[i];

    buf.push(
      p.lat,
      p.lon,
      p.time.getTime()
    );
  }

  return new Blob([new Uint8Array(new TextEncoder().encode(JSON.stringify(buf)))],
    {type:"application/octet-stream"}
  );
}

// ---------------- STOP REMOVAL ----------------
function clean(points,th){

  let kept = [];

  for(let i=1;i<points.length;i++){

    let dt = (points[i].time - points[i-1].time)/1000;

    let d = Math.sqrt(
      Math.pow(points[i].lat-points[i-1].lat,2)+
      Math.pow(points[i].lon-points[i-1].lon,2)
    )*111000;

    let kmh = (d/dt)*3.6;

    if(kmh >= th){
      kept.push(points[i]);
    }
  }

  return kept;
}

// ---------------- FILE LOAD ----------------
input.onchange = async e=>{

  let f = e.target.files[0];

  if(!f) return;

  let ext = f.name.split(".").pop().toLowerCase();

  if(ext==="gpx"){
    pts = parseGPX(await f.text());
  } else {
    alert("FIT input non parsato qui (demo usa GPX)");
  }
};

// ---------------- PROCESS ----------------
btn.onclick = ()=>{

  let th = +document.getElementById("threshold").value;

  let cleaned = clean(pts,th);

  let blob = writeFIT(cleaned);

  let url = URL.createObjectURL(blob);

  dl.href = url;

  dl.download = "cleaned.fit";

  dl.classList.add("visible");
};

</script>

</body>
</html>
